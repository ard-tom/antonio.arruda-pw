<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/spreadsheet.css">
    <script src="js/soma.js">
    </script>
    <title>JS</title>
</head>
<body>
    <table align="center">
        <tr>
            <td>
            <form id="myForm" method="post">
                <div>
                    <label for="username">Nome:</label>
                    <input type="text" id="name" name="name" placeholder="Renato Arruda">
                </div>
            <br><br>
                <div>
                    <label for="age">Idade:</label>
                    <input type="number" id="Idade" name="Idade" min="0" max="105" placeholder="18">
                </div>
            <br>
                <div>
                    <label for="number">RG:</label>
                    <input type="number" id="RG" name="RG" min="1.000000000" placeholder="12.345.678-9">
                </div>
            <br>
                <div>
                    <label for="number">CPF:</label>
                    <input type="number" id="CPF" name="CPF" min="1.0000000000" placeholder="123.456.789-00">
                </div>
            <br>
                <div>
                    <label for="password">E-Mail:</label>
                    <input type="email" id="email" name="email" placeholder="@gmail.com">
                </div>
            <br><br>
                <button type="submit">Cadastrar</button>
                <button type="reset">Limpar</button>
                <button type="button">Alterar</button>
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
